<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TraceBi{% endblock %}</title>

  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    window._mermaid = mermaid;
    mermaid.initialize({ startOnLoad: false, theme: 'dark' });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #060d1f;
      --blue:    #3b82f6;
      --blue-md: #2563eb;
      --blue-lt: rgba(59, 130, 246, 0.12);
      --blue-br: rgba(59, 130, 246, 0.25);
      --bg:      #0c1120;
      --surface: #111827;
      --card:    #141e33;
      --border:  #1e2d4a;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --green:   #22c55e;
      --amber:   #f59e0b;
      --red:     #ef4444;
      --nav-w:   224px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar nav ── */
    nav {
      width: var(--nav-w);
      min-height: 100vh;
      background: var(--navy);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0;
    }
    .nav-brand {
      padding: 24px 20px 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #0d1835 0%, #0f2040 100%);
    }
    .nav-brand h1 {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: .5px;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-brand p { font-size: 11px; color: var(--muted); margin-top: 4px; }

    nav ul { list-style: none; padding: 10px 0; flex: 1; }
    nav ul li a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: #94a3b8;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: background .15s, color .15s;
      border-left: 3px solid transparent;
    }
    nav ul li a:hover {
      background: var(--blue-lt);
      color: var(--text);
    }
    nav ul li a.active {
      background: var(--blue-lt);
      color: var(--blue);
      border-left-color: var(--blue);
    }
    nav ul li a .icon { font-size: 15px; width: 18px; text-align: center; }
    .nav-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Main content ── */
    main {
      margin-left: var(--nav-w);
      flex: 1;
      padding: 36px 40px;
      max-width: 1300px;
    }

    /* ── Headings ── */
    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .page-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 20px;
      transition: border-color .2s;
    }
    .card:hover { border-color: var(--blue-br); }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Stat tiles ── */
    .stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; }
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 24px;
      min-width: 140px;
      transition: border-color .2s, transform .15s;
    }
    .stat:hover { border-color: var(--blue-br); transform: translateY(-1px); }
    .stat-value { font-size: 32px; font-weight: 800; color: var(--blue); }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: #0d1835; }
    thead th {
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      color: #93c5fd;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:nth-child(even) { background: rgba(255,255,255,.02); }
    tbody tr:hover { background: var(--blue-lt); }
    tbody td { padding: 9px 14px; color: var(--text); vertical-align: top; }
    tfoot td { padding: 9px 14px; font-weight: 700; border-top: 1px solid var(--blue-br); color: var(--text); }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-blue   { background: var(--blue-lt); color: #93c5fd; border: 1px solid var(--blue-br); }
    .badge-green  { background: rgba(34,197,94,.12); color: #86efac; border: 1px solid rgba(34,197,94,.25); }
    .badge-amber  { background: rgba(245,158,11,.12); color: #fcd34d; border: 1px solid rgba(245,158,11,.25); }
    .badge-red    { background: rgba(239,68,68,.12); color: #fca5a5; border: 1px solid rgba(239,68,68,.25); }
    .badge-gray   { background: rgba(255,255,255,.06); color: #94a3b8; border: 1px solid var(--border); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
    .btn-primary {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-md) 100%);
      color: #fff;
      box-shadow: 0 2px 12px rgba(59,130,246,.3);
    }
    .btn-outline {
      background: transparent;
      color: var(--blue);
      border: 1px solid var(--blue-br);
    }
    .btn-outline:hover { background: var(--blue-lt); }
    .btn-sm { padding: 5px 11px; font-size: 12px; }

    /* ── Two-column split layout ── */
    .split { display: grid; grid-template-columns: 280px 1fr; gap: 20px; align-items: start; }
    .list-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .list-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .12s;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: var(--blue-lt); }
    .list-item.selected { background: var(--blue-lt); border-left: 3px solid var(--blue); }
    .list-item-name { font-weight: 600; font-size: 13px; color: var(--text); }
    .list-item-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .tab-btn {
      padding: 9px 18px;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }
    .tab-btn:hover  { color: var(--blue); }
    .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

    /* ── Code / pre ── */
    pre { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; }
    .code-block {
      background: #070d1a;
      color: #93c5fd;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.6;
    }

    /* ── Mermaid container ── */
    .mermaid-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      overflow-x: auto;
      min-height: 120px;
    }
    .mermaid-wrap svg { max-width: 100%; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 56px 24px;
      color: var(--muted);
    }
    .empty-icon { font-size: 40px; margin-bottom: 14px; opacity: .5; }
    .empty p { font-size: 13px; }

    /* ── Alert ── */
    .alert {
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .alert-info { background: var(--blue-lt); color: #93c5fd; border-left: 3px solid var(--blue); }
    .alert-err  { background: rgba(239,68,68,.1); color: #fca5a5; border-left: 3px solid var(--red); }

    /* ── Mobile header ── */
    .mobile-header { display: none; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      body { flex-direction: column; }

      .mobile-header {
        display: flex;
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 52px;
        background: var(--navy);
        border-bottom: 1px solid var(--border);
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        z-index: 200;
      }
      .mobile-brand {
        font-size: 16px;
        font-weight: 800;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .hamburger {
        background: none; border: none; cursor: pointer;
        display: flex; flex-direction: column; gap: 5px; padding: 4px;
      }
      .hamburger span {
        display: block; width: 22px; height: 2px;
        background: #94a3b8; border-radius: 2px;
      }

      .nav-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,.6);
        z-index: 250;
      }

      nav {
        position: fixed;
        top: 0; left: 0;
        width: 240px;
        min-height: 100vh;
        z-index: 300;
        transform: translateX(-100%);
        transition: transform .25s ease;
      }
      nav.nav-open { transform: translateX(0); }

      main {
        margin-left: 0;
        margin-top: 52px;
        padding: 20px 16px;
        max-width: 100%;
      }

      .split { grid-template-columns: 1fr; }
      .stats { display: grid; grid-template-columns: 1fr 1fr; }
      .stat-value { font-size: 24px; }
      .card { overflow-x: auto; padding: 16px; }
      table { min-width: 480px; }
      .page-title { font-size: 20px; }
    }

    [x-cloak] { display: none !important; }
  </style>
</head>
<body x-data="{ menuOpen: false }">

<!-- Mobile top bar -->
<div class="mobile-header">
  <span class="mobile-brand">TraceBi</span>
  <button class="hamburger" @click="menuOpen = true" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
</div>

<!-- Overlay -->
<div class="nav-overlay" x-show="menuOpen" @click="menuOpen = false" x-cloak></div>

<nav :class="menuOpen ? 'nav-open' : ''">
  <div class="nav-brand">
    <h1>TraceBi</h1>
    <p>Code-first traceable BI</p>
  </div>
  <ul>
    <li><a href="/" @click="menuOpen = false" class="{% if request.url.path == '/' %}active{% endif %}">
      <span class="icon">⌂</span> Home
    </a></li>
    <li><a href="/connectors" @click="menuOpen = false" class="{% if '/connectors' in request.url.path %}active{% endif %}">
      <span class="icon">⇌</span> Connectors
    </a></li>
    <li><a href="/models" @click="menuOpen = false" class="{% if '/models' in request.url.path %}active{% endif %}">
      <span class="icon">⊞</span> Models
    </a></li>
    <li><a href="/reports" @click="menuOpen = false" class="{% if '/reports' in request.url.path %}active{% endif %}">
      <span class="icon">▤</span> Reports
    </a></li>
    <li><a href="/pipelines" @click="menuOpen = false" class="{% if '/pipelines' in request.url.path %}active{% endif %}">
      <span class="icon">⧖</span> Pipelines
    </a></li>
    <li><a href="/dashboards" @click="menuOpen = false" class="{% if '/dashboards' in request.url.path %}active{% endif %}">
      <span class="icon">◫</span> Dashboards
    </a></li>
  </ul>
  <div class="nav-footer">TraceBi v0.5.0</div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

</body>
</html>
